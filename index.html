<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>School Schedule Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .tab-active {
            background-color: #2563eb;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .day-tab-active {
            background-color: #1e293b;
            color: white;
            transform: scale(1.05);
        }

        .card-appear {
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.5em 1.5em;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-32">

    <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-40 px-4 py-4 shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 text-white w-10 h-10 rounded-2xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-calendar-alt"></i>
                </div>
                <h1 class="text-xl font-black text-slate-900 tracking-tight">ScheduleView</h1>
            </div>
            <div id="status-pill" class="text-[10px] font-bold px-3 py-1.5 rounded-full border bg-slate-100 text-slate-500 uppercase">
                Initializing
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <!-- View Type Toggle -->
        <div class="flex bg-slate-200/60 p-1 rounded-2xl mb-6">
            <button onclick="switchTab('students')" id="btn-students" class="flex-1 py-3 text-[11px] font-extrabold rounded-xl transition-all tab-active uppercase">Students</button>
            <button onclick="switchTab('teachers')" id="btn-teachers" class="flex-1 py-3 text-[11px] font-extrabold rounded-xl transition-all text-slate-500 uppercase">Teachers</button>
        </div>

        <!-- Dropdown Selection -->
        <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 mb-6">
            <label id="selector-label" class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 px-1">Select Schedule</label>
            <select id="group-selector" onchange="handleSelectorChange()" 
                    class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none text-base font-bold text-slate-800 transition-all">
                <option value="">Syncing sheets...</option>
            </select>
        </div>

        <!-- Day Selector -->
        <div id="day-selector-container" class="hidden mb-6">
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 px-1">Cycle Day</label>
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2" id="day-tabs"></div>
        </div>

        <!-- Schedule Container -->
        <div id="data-container" class="space-y-3">
            <div class="text-center py-20 text-slate-300">
                <i class="fas fa-hand-pointer text-2xl mb-4"></i>
                <p class="text-sm font-medium">Select a class to view grid</p>
            </div>
        </div>
    </main>

    <!-- Navigation / Clock -->
    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-40">
        <div class="bg-slate-900/95 backdrop-blur-xl rounded-[2rem] px-8 py-5 shadow-2xl flex justify-between items-center border border-white/10">
            <button onclick="loadData()" class="text-blue-400">
                <i class="fas fa-sync-alt text-xl" id="refresh-icon"></i>
            </button>
            <span id="current-clock" class="text-white font-bold tabular-nums text-sm">--:--</span>
            <button onclick="toggleSettings()" class="text-white/40">
                <i class="fas fa-cog text-xl"></i>
            </button>
        </div>
    </nav>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-md hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center">
            <h3 class="text-2xl font-black mb-6">Configuration</h3>
            <div id="api-display" class="bg-slate-50 p-4 rounded-2xl text-[10px] break-all font-mono text-slate-500 mb-4 border border-slate-100"></div>
            <div class="text-left mb-4 overflow-hidden">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 px-1">Debug Output</span>
                <pre id="debug-headers" class="bg-slate-900 text-green-400 p-3 rounded-xl text-[9px] overflow-x-auto font-mono max-h-24">None</pre>
            </div>
            <button onclick="changeApi()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl mb-3">Update URL</button>
            <button onclick="toggleSettings()" class="w-full py-4 bg-slate-100 text-slate-800 font-bold rounded-2xl">Close</button>
        </div>
    </div>

    <script>
        const DEFAULT_API = "https://script.google.com/macros/s/AKfycbxRRMfmKWF7B5XXawW3louZXsLteGhIpPB9bYWf_jwl2GxnhUJlolRiJp2gmBs0x_4E/exec";
        let apiEndpoint = localStorage.getItem('school_api_url') || DEFAULT_API;
        let allData = { students: [], teachers: [] };
        let activeTab = 'students';
        let activeDayKey = '';

        window.onload = () => {
            updateClock();
            setInterval(updateClock, 1000);
            loadData();
        };

        function updateClock() {
            document.getElementById('current-clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
        }

        async function loadData() {
            const icon = document.getElementById('refresh-icon');
            const status = document.getElementById('status-pill');
            icon.classList.add('fa-spin');
            
            try {
                const res = await fetch(apiEndpoint + "?cb=" + Date.now());
                allData = await res.json();
                status.innerText = "Live";
                status.className = "text-[10px] font-bold px-3 py-1.5 rounded-full border bg-green-50 text-green-600 border-green-100 uppercase";
                populateDropdown();
            } catch (err) {
                status.innerText = "Error";
                status.className = "text-[10px] font-bold px-3 py-1.5 rounded-full border bg-red-50 text-red-600 border-red-100 uppercase";
            } finally {
                icon.classList.remove('fa-spin');
            }
        }

        function populateDropdown() {
            const selector = document.getElementById('group-selector');
            const groups = allData[activeTab] || [];
            selector.innerHTML = `<option value="">-- Select --</option>`;
            groups.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g.id;
                opt.textContent = g.label;
                selector.appendChild(opt);
            });
        }

        function handleSelectorChange() {
            activeDayKey = ''; 
            renderSchedules();
        }

        function setDay(dayKey) {
            activeDayKey = dayKey;
            renderSchedules();
        }

        function renderSchedules() {
            const selectedId = document.getElementById('group-selector').value;
            const container = document.getElementById('data-container');
            const dayTabContainer = document.getElementById('day-selector-container');
            
            if (!selectedId) {
                dayTabContainer.classList.add('hidden');
                container.innerHTML = `<div class="text-center py-20 text-slate-300"><p>Select a schedule</p></div>`;
                return;
            }

            const group = allData[activeTab].find(g => g.id === selectedId);
            const rawData = group.data || [];
            if (rawData.length === 0) return;

            const headers = Object.keys(rawData[0]);
            const firstRow = rawData[0];
            
            let dayMapping = [];
            headers.forEach(h => {
                const hClean = h.trim().toUpperCase();
                const vClean = String(firstRow[h] || "").trim().toUpperCase();
                if (hClean.includes('DAY') || vClean.includes('DAY')) {
                    dayMapping.push({
                        key: h,
                        label: vClean.includes('DAY') ? vClean : hClean
                    });
                }
            });

            document.getElementById('debug-headers').innerText = JSON.stringify(dayMapping);

            if (dayMapping.length === 0) {
                dayTabContainer.classList.add('hidden');
                container.innerHTML = `<div class="text-center py-20 text-slate-400">Could not find Day columns in spreadsheet.</div>`;
                return;
            }

            if (!activeDayKey || !dayMapping.find(m => m.key === activeDayKey)) {
                activeDayKey = dayMapping[0].key;
            }

            // Render Day Tabs
            document.getElementById('day-tabs').innerHTML = dayMapping.map(m => `
                <button onclick="setDay('${m.key}')" 
                    class="px-6 py-3 rounded-xl text-xs font-black transition-all whitespace-nowrap border ${activeDayKey === m.key ? 'day-tab-active border-slate-800 shadow-lg' : 'bg-white text-slate-400 border-slate-100'}">
                    ${m.label}
                </button>
            `).join('');
            dayTabContainer.classList.remove('hidden');

            let html = "";
            const timeCol = headers[0];

            // Start at 0 if first row is a period, otherwise skip header row
            const startIdx = String(rawData[0][timeCol]).toUpperCase().includes('PERIOD') ? 0 : 1;

            for (let i = startIdx; i < rawData.length; i++) {
                const row1 = rawData[i];
                const row2 = rawData[i+1] || {};
                
                let timeVal = String(row1[timeCol] || "").trim();
                let topVal = String(row1[activeDayKey] || "").trim();
                let bottomVal = String(row2[activeDayKey] || "").trim();

                if (!timeVal && !topVal) continue;

                const isSpecial = timeVal.toLowerCase().includes('recess') || 
                                  timeVal.toLowerCase().includes('lunch') || 
                                  timeVal.toLowerCase().includes('entry') ||
                                  timeVal.toLowerCase().includes('break') ||
                                  topVal.toLowerCase().includes('recess') || 
                                  topVal.toLowerCase().includes('lunch');

                if (isSpecial) {
                    html += `
                        <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-4 text-center card-appear">
                            <span class="text-[11px] font-black text-emerald-700 uppercase tracking-widest">${timeVal || topVal}</span>
                        </div>`;
                    continue; 
                }

                if (timeVal) {
                    const parts = timeVal.split(/[\n\r\t]{1,}| {2,}/).filter(p => p.trim().length > 0);
                    const pName = parts[0] || "Period";
                    const pTime = parts.slice(1).join(' ') || "";

                    // ROOM NUMBER LOGIC: Check if bottomVal starts with a number (e.g. "116 TeacherName")
                    let roomNumber = "";
                    let teacherName = bottomVal;
                    const roomMatch = bottomVal.match(/^(\d+)\s*(.*)/);
                    if (roomMatch) {
                        roomNumber = roomMatch[1];
                        teacherName = roomMatch[2];
                    }

                    html += `
                        <div class="bg-white rounded-[2rem] border border-slate-100 shadow-sm p-5 flex items-center gap-5 card-appear">
                            <div class="flex flex-col items-center min-w-[85px] border-r border-slate-100 pr-4 text-center">
                                <span class="text-[10px] font-black text-blue-600 uppercase mb-1">${pName}</span>
                                <span class="text-[9px] font-bold text-slate-400 tabular-nums leading-tight">${pTime}</span>
                            </div>
                            <div class="flex-1 overflow-hidden">
                                <div class="text-sm font-black text-slate-900 mb-1 flex justify-between items-start">
                                    <span class="truncate">${topVal || 'Empty'}</span>
                                    ${roomNumber ? `<span class="bg-blue-600 text-white text-[11px] px-3 py-1 rounded-xl font-black ml-2 whitespace-nowrap shadow-sm">RM ${roomNumber}</span>` : ''}
                                </div>
                                <div class="text-[11px] font-bold text-slate-400 uppercase tracking-tight truncate">${teacherName}</div>
                            </div>
                        </div>
                    `;
                    i++; 
                }
            }

            container.innerHTML = html || `<div class="text-center py-20 text-slate-400">No data rows found.</div>`;
        }

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('btn-students').className = tab === 'students' ? 'flex-1 py-3 text-[11px] font-extrabold rounded-xl transition-all tab-active uppercase' : 'flex-1 py-3 text-[11px] font-extrabold rounded-xl transition-all text-slate-500 uppercase';
            document.getElementById('btn-teachers').className = tab === 'teachers' ? 'flex-1 py-3 text-[11px] font-extrabold rounded-xl transition-all tab-active uppercase' : 'flex-1 py-3 text-[11px] font-extrabold rounded-xl transition-all text-slate-500 uppercase';
            activeDayKey = ''; 
            populateDropdown();
            renderSchedules();
        }

        function toggleSettings() {
            document.getElementById('api-display').innerText = apiEndpoint;
            document.getElementById('settings-modal').classList.toggle('hidden');
        }

        function changeApi() {
            const url = prompt("Paste Apps Script URL:", apiEndpoint);
            if (url) { localStorage.setItem('school_api_url', url); location.reload(); }
        }
    </script>
</body>
</html>
